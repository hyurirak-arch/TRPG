<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoC 6th Edition TRPG Tool</title>
  <!-- Run with: npx serve . OR python -m http.server 8080 (file:// is not supported) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', function() {
      return { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] };
    });
  </script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { background: #0a0a0f; }
    [data-theme="light"] body { background: #f5f0e4; }
  </style>
  <script>try{var t=localStorage.getItem('coc6-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react-classic" src="App.js"></script>
</body>
</html>
